name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: go build ./...
      - run: go build -o dist/sauron-sees.exe ./cmd/sauron-sees
      - uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: sauron-sees-windows
          path: dist/sauron-sees.exe

  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: |
          ! git ls-files | grep -E '(__pycache__/|\.pyc$|/raw/|/sheets/|/dry-run/)'
      - run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
